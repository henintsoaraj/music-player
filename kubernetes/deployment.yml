apiVersion: apps/v1
kind: Deployment
metadata:
  name: music-player
spec:
  replicas: 2
  selector:
    matchLabels:
      app: music-player
  template:
    metadata:
      labels:
        app: music-player
    spec:
      containers:
        - name: player
          image: music-player:v1
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
